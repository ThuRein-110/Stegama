services:
  - type: web
    name: steg-detect-web
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 --max-requests 80 --max-requests-jitter 20
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: STEGAMA_RETENTION_HOURS
        value: "24"
      - key: STEGAMA_RATE_LIMIT_MAX_ANALYSES
        value: "12"
      - key: STEGAMA_RATE_LIMIT_WINDOW_SECONDS
        value: "900"
